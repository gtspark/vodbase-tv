name: Build VodBase TV

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode debug keystore
        run: echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > app/debug.keystore

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          SIGNING_STORE_FILE: debug.keystore
          SIGNING_STORE_PASSWORD: vodbase123
          SIGNING_KEY_ALIAS: vodbase-debug
          SIGNING_KEY_PASSWORD: vodbase123

      - uses: actions/upload-artifact@v4
        with:
          name: vodbase-tv-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
